# Next.js static export (next.config: output = "export") → publish: out
# Netlify: New site from Git → build command & publish előre beállítva ebből a fájlból
# Env változók: Site settings → Environment variables (NEXT_PUBLIC_*)

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
