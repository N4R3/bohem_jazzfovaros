# Next.js static export (next.config: output = "export") → publish: out
# Két külön Netlify site, ugyanabból a repóból (buildkor a Netlify URL alapján választ nyelvet: buildLocale.ts).
# Opcionális: NEXT_PUBLIC_LOCALE=en|hu — egyedi domainnál, ha az URL nem egyezik a SITE_URL_* hosttal.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_SITE_URL_HU = "https://bohemjazz.netlify.app"
  NEXT_PUBLIC_SITE_URL_EN = "https://buhemjazzen.netlify.app"
