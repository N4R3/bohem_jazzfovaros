# Next.js static export (next.config: output = "export") → publish: out
# Két külön Netlify site, ugyanabból a repóból:
#   Magyar: https://bohemjazz.netlify.app  → NEXT_PUBLIC_LOCALE=hu (opcionális, alapértelmezés is hu)
#   Angol:  https://buhemjazzen.netlify.app → NEXT_PUBLIC_LOCALE=en KÖTELEZŐ (Site settings → Environment variables)

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_SITE_URL_HU = "https://bohemjazz.netlify.app"
  NEXT_PUBLIC_SITE_URL_EN = "https://buhemjazzen.netlify.app"
